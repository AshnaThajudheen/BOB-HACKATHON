<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Bob (robot) on top of cat's head -->
  <g transform="translate(50, 30)">
    <!-- Bob's helmet/head -->
    <rect x="-8.75" y="-11.25" width="17.5" height="12.5" rx="2.5" fill="#4169E1" stroke="#2C3E50" stroke-width="1"/>
    <rect x="-7.5" y="-10" width="15" height="2" fill="#5B8DEE"/>
    <rect x="-6.25" y="-12.5" width="5" height="2.5" rx="0.75" fill="#4169E1" stroke="#2C3E50" stroke-width="0.75"/>
    <rect x="1.25" y="-12.5" width="5" height="2.5" rx="0.75" fill="#4169E1" stroke="#2C3E50" stroke-width="0.75"/>
    
    <!-- Bob's visor/face -->
    <rect x="-7.5" y="-6.25" width="15" height="7.5" rx="1.25" fill="#F5F5F5" stroke="#2C3E50" stroke-width="0.75"/>
    
    <!-- Bob's eyes -->
    <circle cx="-3" cy="-2.5" r="2" fill="#2C3E50"/>
    <circle cx="-2.5" cy="-3" r="0.75" fill="#FFFFFF"/>
    <circle cx="3" cy="-2.5" r="2" fill="#2C3E50"/>
    <circle cx="3.5" cy="-3" r="0.75" fill="#FFFFFF"/>
    
    <!-- Bob's smile -->
    <path d="M -3.75,-0.5 Q 0,1.25 3.75,-0.5" stroke="#2C3E50" stroke-width="0.75" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Cat body -->
  <g transform="translate(50, 65)">
    <!-- Cat's head -->
    <ellipse cx="0" cy="-7.5" rx="17.5" ry="16.25" fill="#F4A460" stroke="#2C3E50" stroke-width="1"/>
    <ellipse cx="0" cy="-6.25" rx="13.75" ry="12.5" fill="#FFF8DC"/>
    
    <!-- Cat's ears -->
    <path d="M -12.5,-17.5 L -15,-23.75 L -8.75,-18.75 Z" fill="#F4A460" stroke="#2C3E50" stroke-width="1"/>
    <path d="M -12.5,-18.75 L -13.75,-21.25 L -10.5,-18 Z" fill="#FFE4B5"/>
    <path d="M 12.5,-17.5 L 15,-23.75 L 8.75,-18.75 Z" fill="#F4A460" stroke="#2C3E50" stroke-width="1"/>
    <path d="M 12.5,-18.75 L 13.75,-21.25 L 10.5,-18 Z" fill="#FFE4B5"/>
    
    <!-- Cat's eyes -->
    <ellipse cx="-6.25" cy="-8.75" rx="4.5" ry="5.5" fill="#FFFFFF" stroke="#2C3E50" stroke-width="0.75"/>
    <ellipse cx="-6.25" cy="-8" rx="2.5" ry="4" fill="#2C3E50"/>
    <ellipse cx="-5.5" cy="-9.5" r="1" fill="#FFFFFF"/>
    
    <ellipse cx="6.25" cy="-8.75" rx="4.5" ry="5.5" fill="#FFFFFF" stroke="#2C3E50" stroke-width="0.75"/>
    <ellipse cx="6.25" cy="-8" rx="2.5" ry="4" fill="#2C3E50"/>
    <ellipse cx="7" cy="-9.5" r="1" fill="#FFFFFF"/>
    
    <!-- Cat's nose -->
    <path d="M 0,-3.75 L -1.25,-2 L 1.25,-2 Z" fill="#2C3E50"/>
    
    <!-- Cat's mouth -->
    <path d="M 0,-2 Q -3,0 -4.5,-0.5" stroke="#2C3E50" stroke-width="0.75" fill="none" stroke-linecap="round"/>
    <path d="M 0,-2 Q 3,0 4.5,-0.5" stroke="#2C3E50" stroke-width="0.75" fill="none" stroke-linecap="round"/>
    
    <!-- Cat's whiskers -->
    <line x1="-17.5" y1="-6.25" x2="-11.25" y2="-7" stroke="#2C3E50" stroke-width="0.5"/>
    <line x1="-17.5" y1="-4.5" x2="-11.25" y2="-5" stroke="#2C3E50" stroke-width="0.5"/>
    <line x1="17.5" y1="-6.25" x2="11.25" y2="-7" stroke="#2C3E50" stroke-width="0.5"/>
    <line x1="17.5" y1="-4.5" x2="11.25" y2="-5" stroke="#2C3E50" stroke-width="0.5"/>
    
    <!-- Cat's body with code sign -->
    <rect x="-15" y="5" width="30" height="20" rx="3.75" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1"/>
    
    <!-- Code symbol </> -->
    <text x="0" y="17.5" font-family="monospace" font-size="11" font-weight="bold" fill="#4169E1" text-anchor="middle"></></text>
  </g>
  
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8D4F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8C8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>

<!-- Made with Bob -->
